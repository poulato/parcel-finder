<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geoktimonas Admin</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155; }
    .admin-header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .admin-header h1 span { font-size: 22px; }
    .admin-user { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #94a3b8; }
    .admin-user img { width: 28px; height: 28px; border-radius: 50%; }
    .admin-user .sign-out { background: none; border: 1px solid #475569; color: #94a3b8; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .admin-user .sign-out:hover { border-color: #64748b; color: #cbd5e1; }
    .admin-body { max-width: 900px; margin: 0 auto; padding: 24px; }
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .admin-tab { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
    .admin-tab.active { background: #334155; color: #e2e8f0; border-color: #475569; }
    .admin-tab:hover:not(.active) { border-color: #475569; color: #cbd5e1; }
    .admin-tab .count { background: #475569; color: #e2e8f0; padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
    .admin-tab.active .count { background: #6b9eff; color: #0f172a; }
    .admin-auth { text-align: center; padding: 80px 20px; }
    .admin-auth h2 { font-size: 20px; margin-bottom: 8px; }
    .admin-auth p { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
    .admin-denied { text-align: center; padding: 80px 20px; color: #f87171; }
    .admin-denied h2 { margin-bottom: 8px; }
    .admin-denied p { color: #94a3b8; font-size: 14px; }
    .admin-empty { text-align: center; padding: 40px 20px; color: #64748b; font-size: 14px; }
    .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .stat-card { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px 16px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 700; color: #f1f5f9; }
    .stat-card .stat-label { font-size: 12px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .listing-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-bottom: 12px; transition: border-color .15s; }
    .listing-card:hover { border-color: #475569; }
    .listing-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .listing-card-info { flex: 1; min-width: 0; }
    .listing-card-title { font-size: 15px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
    .listing-card-price { font-size: 14px; color: #6b9eff; font-weight: 600; margin-bottom: 4px; }
    .listing-card-meta { font-size: 12px; color: #64748b; display: flex; flex-wrap: wrap; gap: 6px; }
    .listing-card-meta span { display: flex; align-items: center; gap: 3px; }
    .listing-card-desc { font-size: 13px; color: #94a3b8; margin-top: 8px; line-height: 1.4; }
    .listing-card-user { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #283040; font-size: 12px; color: #94a3b8; }
    .listing-card-user img { width: 22px; height: 22px; border-radius: 50%; }
    .listing-card-photos { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; }
    .listing-card-photos img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #334155; }
    .listing-card-cert { margin-top: 6px; font-size: 11px; color: #10b981; display: flex; align-items: center; gap: 4px; }
    .listing-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
    .btn-approve { background: #166534; color: #bbf7d0; }
    .btn-approve:hover { background: #15803d; }
    .btn-reject { background: #450a0a; color: #fca5a5; }
    .btn-reject:hover { background: #7f1d1d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .listing-card-date { font-size: 11px; color: #475569; margin-top: 4px; }
    #googleSignInAdmin { display: inline-block; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .user-table th { text-align: left; padding: 10px 12px; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .user-table td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
    .user-table tr:hover td { background: rgba(148,163,184,0.05); }
    .user-row-avatar { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
    .user-row-name { display: inline-flex; align-items: center; }
    .user-row-email { color: #94a3b8; }
    .btn-edit { background: #1e3a5f; color: #93c5fd; }
    .btn-edit:hover { background: #1e4d8a; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 24px; width: 480px; max-width: 92vw; max-height: 85vh; overflow-y: auto; }
    .modal-box h3 { font-size: 16px; margin-bottom: 16px; color: #e2e8f0; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .modal-field input, .modal-field textarea, .modal-field select { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .modal-field textarea { resize: vertical; min-height: 70px; }
    .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { outline: none; border-color: #6b9eff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-cancel { background: #334155; color: #94a3b8; }
    .btn-cancel:hover { background: #475569; color: #e2e8f0; }
    .btn-save { background: #2563eb; color: #fff; }
    .btn-save:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1><span>🏡</span> Geoktimonas Admin</h1>
    <div class="admin-user" id="adminUser" style="display:none;">
      <img id="adminAvatar" src="" alt="" />
      <span id="adminName"></span>
      <button class="sign-out" onclick="adminSignOut()">Sign out</button>
    </div>
  </div>

  <div class="admin-body">
    <div id="authScreen" class="admin-auth">
      <h2>Admin Panel</h2>
      <p>Sign in with your Google account to manage listings.</p>
      <div id="googleSignInAdmin"></div>
    </div>

    <div id="deniedScreen" class="admin-denied" style="display:none;">
      <h2>Access Denied</h2>
      <p>Your account does not have admin privileges.</p>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="stat-value" id="statLists">–</div><div class="stat-label">Saved Lists</div></div>
        <div class="stat-card"><div class="stat-value" id="statParcels">–</div><div class="stat-label">Saved Parcels</div></div>
        <div class="stat-card"><div class="stat-value" id="statViews">–</div><div class="stat-label">Ad Views</div></div>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" data-status="pending" onclick="switchAdminTab('pending')">Pending <span class="count" id="countPending">0</span></button>
        <button class="admin-tab" data-status="active" onclick="switchAdminTab('active')">Active <span class="count" id="countActive">0</span></button>
        <button class="admin-tab" data-status="rejected" onclick="switchAdminTab('rejected')">Rejected <span class="count" id="countRejected">0</span></button>
        <button class="admin-tab" data-status="users" onclick="switchAdminTab('users')">Users <span class="count" id="countUsers">0</span></button>
      </div>
      <div id="listingsContainer"></div>
    </div>
  </div>

<script>
var GOOGLE_CLIENT_ID = '284743039293-0lo05gnap8immcls45hqsniv16djtdap.apps.googleusercontent.com';
var API_BASE = '/api';

var adminToken = null;
var adminUser = null;
var currentTab = 'pending';

function adminAuthHeaders() {
  return adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {};
}

function escapeHTML(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function formatDate(d) {
  try { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch(e) { return d; }
}

function onAdminSignIn(response) {
  adminToken = response.credential;
  var parts = adminToken.split('.');
  var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
  adminUser = { id: payload.sub, email: payload.email, name: payload.name, picture: payload.picture };
  localStorage.setItem('admin_auth_token', adminToken);
  localStorage.setItem('admin_auth_user', JSON.stringify(adminUser));
  checkAdminAccess();
}

function checkAdminAccess() {
  document.getElementById('authScreen').style.display = 'none';
  fetch(API_BASE + '/admin/listings?status=pending', { headers: adminAuthHeaders() })
    .then(function(res) {
      if (res.status === 403) {
        document.getElementById('deniedScreen').style.display = '';
        return;
      }
      document.getElementById('adminPanel').style.display = '';
      document.getElementById('adminUser').style.display = 'flex';
      document.getElementById('adminAvatar').src = adminUser.picture || '';
      document.getElementById('adminName').textContent = adminUser.name || adminUser.email;
      loadAllCounts();
      loadListings('pending');
    });
}

function adminSignOut() {
  adminToken = null;
  adminUser = null;
  localStorage.removeItem('admin_auth_token');
  localStorage.removeItem('admin_auth_user');
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminUser').style.display = 'none';
  document.getElementById('deniedScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = '';
  if (window.google && google.accounts) google.accounts.id.disableAutoSelect();
}

function switchAdminTab(status) {
  currentTab = status;
  document.querySelectorAll('.admin-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-status') === status);
  });
  if (status === 'users') {
    loadUsers();
  } else if (status === 'lists') {
    loadAdminLists();
  } else {
    loadListings(status);
  }
}

function loadAllCounts() {
  ['pending', 'active', 'rejected'].forEach(function(s) {
    fetch(API_BASE + '/admin/listings?status=' + s, { headers: adminAuthHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var el = document.getElementById('count' + s.charAt(0).toUpperCase() + s.slice(1));
        if (el) el.textContent = data.length || 0;
      });
  });
  fetch(API_BASE + '/admin/users', { headers: adminAuthHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('countUsers');
      if (el) el.textContent = data.length || 0;
    });
  fetch(API_BASE + '/admin/stats', { headers: adminAuthHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('statLists').textContent = data.lists || 0;
      document.getElementById('statParcels').textContent = data.saved_parcels || 0;
      document.getElementById('statViews').textContent = data.total_views || 0;
    });
}

function loadListings(status) {
  var container = document.getElementById('listingsContainer');
  container.innerHTML = '<div class="loading">Loading...</div>';
  fetch(API_BASE + '/admin/listings?status=' + status, { headers: adminAuthHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(listings) {
      if (!listings.length) {
        container.innerHTML = '<div class="admin-empty">No ' + status + ' listings.</div>';
        return;
      }
      container.innerHTML = listings.map(function(l) { return renderListingCard(l, status); }).join('');
    })
    .catch(function() {
      container.innerHTML = '<div class="admin-empty">Failed to load listings.</div>';
    });
}

function renderListingCard(l, status) {
  var priceText = l.price ? '€' + Number(l.price).toLocaleString() : 'Negotiable';
  var loc = l.municipality || l.district || '';
  var photos = [];
  try { photos = l.photo_keys ? JSON.parse(l.photo_keys) : []; } catch(e) {}
  var photosHTML = photos.length
    ? '<div class="listing-card-photos">' + photos.map(function(k) {
        return '<img src="' + API_BASE.replace('/api', '') + '/api/images/' + encodeURIComponent(k) + '" alt="" />';
      }).join('') + '</div>'
    : '';
  var certHTML = l.certificate_key
    ? '<div class="listing-card-cert"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Certificate provided</div>'
    : '';

  var editBtn = '<button class="btn btn-edit" onclick=\'openEditModal(' + JSON.stringify(JSON.stringify(l)) + ')\'>Edit</button>';
  var actionsHTML = '';
  if (status === 'pending') {
    actionsHTML = '<div class="listing-card-actions">' +
      '<button class="btn btn-approve" onclick="adminAction(\'' + l.id + '\', \'active\')">Approve</button>' +
      '<button class="btn btn-reject" onclick="adminAction(\'' + l.id + '\', \'rejected\')">Reject</button>' +
      editBtn +
      '</div>';
  } else if (status === 'active') {
    actionsHTML = '<div class="listing-card-actions">' +
      '<button class="btn btn-reject" onclick="adminAction(\'' + l.id + '\', \'rejected\')">Reject</button>' +
      editBtn +
      '</div>';
  } else if (status === 'rejected') {
    actionsHTML = '<div class="listing-card-actions">' +
      '<button class="btn btn-approve" onclick="adminAction(\'' + l.id + '\', \'active\')">Approve</button>' +
      editBtn +
      '</div>';
  }

  return '<div class="listing-card" id="card-' + l.id + '">' +
    '<div class="listing-card-top">' +
      '<div class="listing-card-info">' +
        (l.title ? '<div class="listing-card-title">' + escapeHTML(l.title) + '</div>' : '') +
        '<div class="listing-card-price">' + priceText + '</div>' +
        '<div class="listing-card-meta">' +
          (loc ? '<span>' + escapeHTML(loc) + '</span>' : '') +
          '<span>&bull; Parcel ' + l.parcel_nbr + ' &bull; ' + l.sheet + '/' + l.plan_nbr + '</span>' +
          '<span>&bull; 👁 ' + (l.views || 0) + ' views</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    (l.description ? '<div class="listing-card-desc">' + escapeHTML(l.description) + '</div>' : '') +
    photosHTML +
    certHTML +
    '<div class="listing-card-user">' +
      (l.user_picture ? '<img src="' + l.user_picture + '" alt="" />' : '') +
      '<span>' + escapeHTML(l.user_name || 'Anonymous') + '</span>' +
    '</div>' +
    '<div class="listing-card-date">Submitted ' + formatDate(l.created_at) + '</div>' +
    actionsHTML +
  '</div>';
}

function loadUsers() {
  var container = document.getElementById('listingsContainer');
  container.innerHTML = '<div class="loading">Loading...</div>';
  fetch(API_BASE + '/admin/users', { headers: adminAuthHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(users) {
      if (!users.length) {
        container.innerHTML = '<div class="admin-empty">No registered users.</div>';
        return;
      }
      var html = '<table class="user-table"><thead><tr><th>User</th><th>Email</th><th>Registered</th></tr></thead><tbody>';
      html += users.map(function(u) {
        var avatar = u.picture ? '<img class="user-row-avatar" src="' + escapeHTML(u.picture) + '" alt="" />' : '';
        return '<tr><td><span class="user-row-name">' + avatar + escapeHTML(u.name || 'Unknown') + '</span></td>' +
          '<td class="user-row-email">' + escapeHTML(u.email) + '</td>' +
          '<td>' + formatDate(u.created_at) + '</td></tr>';
      }).join('');
      html += '</tbody></table>';
      container.innerHTML = html;
    })
    .catch(function() {
      container.innerHTML = '<div class="admin-empty">Failed to load users.</div>';
    });
}

function loadAdminLists() {
  var container = document.getElementById('listingsContainer');
  container.innerHTML = '<div class="loading">Loading...</div>';
  fetch(API_BASE + '/admin/lists', { headers: adminAuthHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(lists) {
      if (!lists.length) {
        container.innerHTML = '<div class="admin-empty">No saved lists.</div>';
        return;
      }
      var html = '<table class="user-table"><thead><tr><th>List Name</th><th>Owner</th><th>Parcels</th><th>Created</th></tr></thead><tbody>';
      html += lists.map(function(l) {
        var avatar = l.owner_picture ? '<img class="user-row-avatar" src="' + escapeHTML(l.owner_picture) + '" alt="" />' : '';
        return '<tr><td><strong>' + escapeHTML(l.name || 'Untitled') + '</strong></td>' +
          '<td><span class="user-row-name">' + avatar + escapeHTML(l.owner_name || l.owner_email || 'Unknown') + '</span></td>' +
          '<td>' + (l.parcel_count || 0) + '</td>' +
          '<td>' + formatDate(l.created_at) + '</td></tr>';
      }).join('');
      html += '</tbody></table>';
      container.innerHTML = html;
    })
    .catch(function() {
      container.innerHTML = '<div class="admin-empty">Failed to load lists.</div>';
    });
}

function adminAction(id, newStatus) {
  var card = document.getElementById('card-' + id);
  var btns = card ? card.querySelectorAll('.btn') : [];
  btns.forEach(function(b) { b.disabled = true; });

  fetch(API_BASE + '/admin/listings/' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: Object.assign({ 'Content-Type': 'application/json' }, adminAuthHeaders()),
    body: JSON.stringify({ status: newStatus })
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Failed');
    loadAllCounts();
    loadListings(currentTab);
  })
  .catch(function() {
    alert('Action failed');
    btns.forEach(function(b) { b.disabled = false; });
  });
}

function restoreAdminSession() {
  var token = localStorage.getItem('admin_auth_token');
  var user = localStorage.getItem('admin_auth_user');
  if (token && user) {
    try {
      adminUser = JSON.parse(user);
      var payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      if (payload.exp * 1000 > Date.now()) {
        adminToken = token;
        checkAdminAccess();
        return true;
      }
    } catch(e) {}
  }
  return false;
}

function initAdminGoogleSignIn() {
  if (!window.google || !google.accounts) {
    setTimeout(initAdminGoogleSignIn, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: onAdminSignIn,
    auto_select: true
  });
  google.accounts.id.renderButton(document.getElementById('googleSignInAdmin'), {
    type: 'standard', size: 'large', theme: 'filled_black', text: 'signin_with', width: 250
  });
  if (!restoreAdminSession()) {
    google.accounts.id.prompt();
  }
}

var editingId = null;

function openEditModal(jsonStr) {
  var l = JSON.parse(jsonStr);
  editingId = l.id;
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'editModal';
  overlay.onclick = function(e) { if (e.target === overlay) closeEditModal(); };
  overlay.innerHTML =
    '<div class="modal-box">' +
      '<h3>Edit Listing</h3>' +
      '<div class="modal-field"><label>Title</label><input id="editTitle" value="' + escapeHTML(l.title || '') + '" /></div>' +
      '<div class="modal-field"><label>Price (€)</label><input id="editPrice" type="number" value="' + (l.price || '') + '" /></div>' +
      '<div class="modal-field"><label>Description</label><textarea id="editDesc">' + escapeHTML(l.description || '') + '</textarea></div>' +
      '<div class="modal-field"><label>Contact</label><input id="editContact" value="' + escapeHTML(l.contact || '') + '" /></div>' +
      '<div class="modal-field"><label>Status</label>' +
        '<select id="editStatus">' +
          '<option value="pending"' + (l.status === 'pending' ? ' selected' : '') + '>Pending</option>' +
          '<option value="active"' + (l.status === 'active' ? ' selected' : '') + '>Active</option>' +
          '<option value="rejected"' + (l.status === 'rejected' ? ' selected' : '') + '>Rejected</option>' +
        '</select>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>' +
        '<button class="btn btn-save" id="editSaveBtn" onclick="saveEdit()">Save</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
}

function closeEditModal() {
  var m = document.getElementById('editModal');
  if (m) m.remove();
  editingId = null;
}

function saveEdit() {
  if (!editingId) return;
  var btn = document.getElementById('editSaveBtn');
  if (btn) btn.disabled = true;

  var body = {
    title: document.getElementById('editTitle').value || null,
    price: document.getElementById('editPrice').value ? Number(document.getElementById('editPrice').value) : null,
    description: document.getElementById('editDesc').value || null,
    contact: document.getElementById('editContact').value || null,
    status: document.getElementById('editStatus').value
  };

  fetch(API_BASE + '/listings/' + encodeURIComponent(editingId), {
    method: 'PUT',
    headers: Object.assign({ 'Content-Type': 'application/json' }, adminAuthHeaders()),
    body: JSON.stringify(body)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Failed');
    closeEditModal();
    loadAllCounts();
    loadListings(currentTab);
  })
  .catch(function() {
    alert('Save failed');
    if (btn) btn.disabled = false;
  });
}

initAdminGoogleSignIn();
</script>
</body>
</html>
