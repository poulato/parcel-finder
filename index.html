<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geoktimonas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
</head>
<body>
  <header id="appHeader">
    <div id="headerTitle">
      <span id="headerIcon" aria-hidden="true">🏡</span>
      <span>Geoktimonas</span>
    </div>
    <div id="headerRight">
      <button id="openBtnMobile" onclick="openSidebar()" title="Show search panel">&#9776;</button>
    </div>
  </header>

  <div id="sidebar">
    <h1>
      <span>Search</span>
      <button class="close-btn" onclick="closeSidebar()" title="Hide panel">&#10005;</button>
    </h1>

    <div class="field">
      <label for="sheet">Sheet</label>
      <input type="text" id="sheet" placeholder="e.g. 47" />
    </div>
    <div class="field">
      <label for="plan">Plan</label>
      <input type="text" id="plan" placeholder="e.g. 41" />
    </div>
    <div class="field">
      <label for="parcel">Parcel Number</label>
      <input type="text" id="parcel" placeholder="e.g. 190" />
    </div>
    <div class="field">
      <label for="district">District (optional)</label>
      <select id="district">
        <option value="">Any</option>
        <option value="1">Nicosia (Lefkosia)</option>
        <option value="5">Limassol (Lemesos)</option>
        <option value="4">Larnaca (Larnaka)</option>
        <option value="6">Paphos (Pafos)</option>
        <option value="2">Famagusta (Ammochostos)</option>
        <option value="3">Kyrenia (Keryneia)</option>
      </select>
    </div>

    <button id="searchBtn" onclick="doSearch()">Find Parcel</button>
    <button id="clearBtn" onclick="doClear()" style="display:none; width:100%; padding:10px; background:#334155; color:#cbd5e1; border:none; border-radius:6px; font-size:14px; cursor:pointer; margin-top:-8px;">Clear</button>
    <button id="addToListBtn">Add to List</button>
    <div class="error" id="errorMsg"></div>
    <div class="hint" id="listHint"></div>

    <div class="hint" id="shareHint" style="display:none;">
      The URL in your browser is the shareable link.
    </div>

    <div class="parcel-list-wrap">
      <h2>My Parcel List</h2>
      <div id="parcelListEmpty" class="parcel-list-empty">No parcels added yet.</div>
      <div id="parcelList"></div>
    </div>
  </div>

  <div id="map-wrap">
    <button id="openBtnDesktop" onclick="openSidebar()" title="Show search panel">&#9776;</button>
    <div id="map"></div>
  </div>

  <script src="./assets/app.js" defer></script>
</body>
</html>
