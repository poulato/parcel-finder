<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geoktimonas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./assets/styles.css?v=4" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header id="appHeader">
    <div id="headerTitle">
      <span id="headerIcon" aria-hidden="true">🏡</span>
      <span>Geoktimonas</span>
    </div>
    <div id="headerRight">
      <button id="openBtnMobile" onclick="openSidebar()" title="Show search panel">&#9776;</button>
    </div>
  
  </header>

  <div id="backdrop" onclick="closeSidebar()"></div>

  <div id="sidebar" class="hidden">
    <div class="sheet-handle" onclick="closeSidebar()"></div>
    <div class="sidebar-header">
      <nav class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="search">Search</button>
        <button class="sidebar-tab" data-tab="list">List</button>
      </nav>
      <button class="close-btn" onclick="closeSidebar()" title="Hide panel">&#10005;</button>
    </div>

    <div id="viewSearch" class="sidebar-view active">
      <div class="field">
        <label for="sheet">Sheet</label>
        <input type="text" id="sheet" placeholder="e.g. 47" />
      </div>
      <div class="field">
        <label for="plan">Plan</label>
        <input type="text" id="plan" placeholder="e.g. 41" />
      </div>
      <div class="field">
        <label for="parcel">Parcel Number</label>
        <input type="text" id="parcel" placeholder="e.g. 190" />
      </div>
      <div class="field">
        <label for="district">District (optional)</label>
        <select id="district">
          <option value="">Any</option>
          <option value="1">Nicosia (Lefkosia)</option>
          <option value="5">Limassol (Lemesos)</option>
          <option value="4">Larnaca (Larnaka)</option>
          <option value="6">Paphos (Pafos)</option>
          <option value="2">Famagusta (Ammochostos)</option>
          <option value="3">Kyrenia (Keryneia)</option>
        </select>
      </div>

      <button id="searchBtn" onclick="doSearch()">Find Parcel</button>

      <button id="addToListBtn">Add to List</button>
      <div class="error" id="errorMsg"></div>
      <div class="hint" id="listHint"></div>

    </div>

    <div id="viewList" class="sidebar-view">
      <div id="listAuthPrompt" class="list-auth-prompt">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <p>Sign in to save and manage your parcel list</p>
        <div id="googleSignInList"></div>
      </div>
      <div id="parcelListWrap" style="display:none;">
        <div id="listsContainer"></div>
        <div id="listsEmpty" class="parcel-list-empty">No lists yet. Create one to start saving parcels.</div>
      </div>
    </div>

    <div id="saveOverlay" class="save-overlay hidden">
      <div class="save-overlay-header">
        <h3 class="save-panel-title">Save to list</h3>
        <button id="saveOverlayClose" title="Close">&times;</button>
      </div>
      <div id="saveListPicker"></div>
      <button id="newListBtn" class="new-list-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New List
      </button>
      <div id="newListForm" style="display:none;">
        <input type="text" id="newListName" placeholder="List name" />
        <button id="newListSave">Create</button>
      </div>
    </div>

    <div id="viewListParcels" class="sidebar-view">
      <button id="backToLists" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to lists
      </button>
      <h3 id="listParcelsTitle"></h3>
      <div id="listParcelsEmpty" class="parcel-list-empty" style="display:none;">No parcels in this list.</div>
      <div id="listParcels"></div>
    </div>

    <div id="viewDetails" class="sidebar-view">
      <div id="detailsContent"></div>
      <hr class="details-divider">
      <div id="detailsActions" style="display:none;">
        <div class="action-item">
          <button id="detailsAddBtn" title="Add to List">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <span class="action-label">Save</span>
        </div>
        <div class="action-item">
          <button id="detailsShareBtn" title="Share">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
          <span class="action-label">Share</span>
        </div>
      </div>
    </div>
  </div>

  <nav id="iconRail">
    <div id="railLogo" aria-hidden="true">🏡</div>
    <button class="rail-btn" data-tab="search" title="Search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="rail-btn" data-tab="list" title="List">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>List</span>
    </button>
  </nav>

  <div id="searchBar">
    <div id="searchBarMain" onclick="event.stopPropagation(); openSearchPanel()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span id="searchBarText">Search parcels</span>
    </div>
    <button id="searchBarClear" onclick="event.stopPropagation(); doClear(); openSearchPanel();">&times;</button>
    <button id="authBtn" title="Sign in">
      <svg id="authBtnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <img id="authBtnAvatar" style="display:none; width:28px; height:28px; border-radius:50%;" />
    </button>
  </div>

  <button id="authBtnDesktop" title="Sign in">
    <svg id="authBtnDesktopIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <img id="authBtnDesktopAvatar" style="display:none; width:24px; height:24px; border-radius:50%;" />
    <span id="authBtnDesktopText">Sign in</span>
  </button>

  <div id="userMenu" class="user-menu hidden">
    <div class="user-menu-info">
      <img id="userMenuAvatar" />
      <div>
        <div id="userMenuName"></div>
        <div id="userMenuEmail"></div>
      </div>
    </div>
    <button id="userMenuSignOut">Sign out</button>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
  </div>

  <nav id="bottomBar">
    <button class="bottom-tab active" data-tab="search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="bottom-tab" data-tab="list">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>List</span>
    </button>
  </nav>

  <div id="googleSignInDiv" style="position:fixed; top:-9999px; left:-9999px;"></div>
  <script src="./assets/app.js?v=4" defer></script>
</body>
</html>
